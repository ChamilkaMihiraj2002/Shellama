Architecture:
- Prefer composable services and focused modules over large multi-purpose files.
- Introduce patterns only when they clarify responsibilities, not as ceremony.

DRY Principle:
- Reuse existing workspace helpers before adding new utilities.
- Extract repeated logic when the same behavior appears more than once.

Type Safety:
- Use explicit TypeScript types or interfaces for shared data structures.
- Avoid any unless the tradeoff is clearly justified.

Review Step:
- For code or file changes, explain the plan first and briefly name the pattern or structural choice used.
